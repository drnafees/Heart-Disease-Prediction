<div class="col-lg-4 h-100">
    <div class="card p-3">
        <h5 class="fw-bold mb-3">Risk Profile</h5>
        <div class="scrollable-content">
            {% for r in results %}
            <div class="result-item bg-light p-3 rounded-3 mb-2">
                <div class="d-flex justify-content-between mb-1">
                    <span class="small text-muted fw-bold">{{ r.Model }}</span>
                    <span class="small fw-bold">{{ "%.1f"|format(r.Probability * 100) }}%</span>
                </div>
                <h5 class="fw-bold mb-2 {{ 'text-success' if 'Low' in r['Risk Level'] else 'text-warning' if 'Medium' in r['Risk Level'] else 'text-danger' }}">
                    {{ r['Risk Level'] }}
                </h5>
                <div class="progress" style="height: 6px;">
                    <div class="progress-bar" style="width: {{ r.Probability * 100 }}%"></div>
                </div>
            </div>
            {% endfor %}
        </div>
        <button type="button" class="btn btn-outline-secondary shadow-sm rounded-pill px-4">
            Save Record
        </button>
    </div>
</div>
