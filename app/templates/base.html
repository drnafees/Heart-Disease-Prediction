<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>
            {% block title %}Heart Disease Risk Prediction{% endblock %}
        </title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='styles.css') }}"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        />
    </head>
    <body>
        <div class="app-wrapper">
            <header
                class="header-compact d-flex justify-content-between align-items-center"
            >
                <div class="text-start">
                    <h1 class="main-title text-uppercase">
                        Heart Disease Risk Prediction
                    </h1>
                    <p class="text-muted small fw-bold mb-0">
                        Using Deep Learning with Multi-Class Classification
                    </p>
                </div>
                {% block navbar %} {% include 'includes/_navbar.html' %} {%
                endblock %}
            </header>

            <div class="content-area">{% block content %}{% endblock %}</div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        {% block scripts %}{% endblock %}
    </body>
</html>
