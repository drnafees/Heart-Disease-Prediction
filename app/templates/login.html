{% extends "base.html" %}
{% block title %}Login - Heart Disease Risk Prediction{% endblock %}
{% block navbar %}{% endblock %}
{% block content %}
<div class="login-container d-flex justify-content-center align-items-center">
    <div class="card col-lg-4 p-4 bg-light">
        <h3 class="text-center mb-4 text-uppercase fw-bold">Login</h3>
        {% if error %}
            <div class="alert alert-danger" role="alert">
                {{ error }}
            </div>
        {% endif %}
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="mb-3">
                <label for="email">User ID <span class="text-muted">(default: test@domain.com)</span></label>
                <input type="email" class="form-control" name="email" required>
            </div>
            
            <div class="mb-3">
                <label for="password">Password <span class="text-muted">(default: password)</span></label>
                <input type="password" class="form-control" name="password" required>
            </div>
            
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary mt-3">Login</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
