{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const canvas = document.getElementById('detailChart');
        const ctx = canvas.getContext('2d');

        const history = {{ patient.medical_history | tojson | safe }};

        new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['BP', 'Cholesterol', 'Max HR', 'ST Depress', 'Vessels'],
                datasets: [{
                    label: 'Current Patient',
                    data: [
                        (history.trestbps || 120) / 2,
                        (history.chol || 200) / 6,
                        (history.thalch || 150) / 2.2,
                        (history.oldpeak || 0) * 16,
                        (history.ca || 0) * 25
                    ],
                    backgroundColor: 'rgba(220, 53, 69, 0.2)',
                    borderColor: '#dc3545',
                    pointBackgroundColor: '#dc3545',
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    r: { beginAtZero: true, max: 100, ticks: { display: false } }
                }
            }
        });
    });
</script>
{% endblock %} {% extends "base.html" %} {% block content %}
    <div class="row g-4">
        <div class="col-lg-5 d-flex flex-column g-4 align-self-start">
            <div class="card border-0 flex-shrink-0 mb-2">
                <div class="card-body">
                    <nav class="mb-4">
                        <a href="{{ url_for('main.patients') }}"
                           class="link-secondary text-decoration-none d-inline-flex align-items-center small fw-semibold">
                            <div class="bg-light border rounded-circle d-flex align-items-center justify-content-center me-2"
                                 style="width: 32px; height: 32px;">
                                <i class="bi bi-arrow-left"></i>
                            </div>
                            <span>Back to Patients</span>
                        </a>
                    </nav>

                    <div class="d-flex align-items-center">
                        <div class="bg-primary-subtle text-primary rounded-3 d-flex align-items-center justify-content-center me-3"
                             style="width: 54px; height: 54px;">
                            <i class="bi bi-person-vcard fs-3"></i>
                        </div>

                        <div>
                            <h4 class="fw-bold mb-0 text-dark">
                                {{ patient.first_name }} {{ patient.last_name }}
                            </h4>
                            <div class="d-flex align-items-center">
                                <span class="badge bg-light text-secondary border fw-normal me-2">MR#</span>
                                <span class="text-muted font-monospace small">{{ patient.mr }}</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="flex-grow-1 min-height-0">
                {% include "includes/_risk_card.html" %}
            </div>
        </div>
        <div class="col-lg-7">
            <div class="card border-0 rounded-4 flex-grow-1">
                <div class="card-body d-flex flex-column">
                    <h5 class="fw-bold mb-3">Risk Factor Visualization</h5>
                    <div class="flex-grow-1" style="min-height: 0;">
                        <canvas id="detailChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
